services:
  remote-server:
    build:
      context: ../../..
      dockerfile: scripts/neuron-remote-control/demo/Dockerfile.remote-server
    ports:
      - "9010:9010"

  backend-stub:
    build:
      context: ../../..
      dockerfile: scripts/neuron-remote-control/demo/Dockerfile.backend-stub
    environment:
      REMOTE_TLS_INSECURE: "1"
    ports:
      - "18080:18080"
    depends_on:
      - remote-server
